name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find project
        run: |
          ls
          find . -name gradlew

      - name: Upload scan
        uses: actions/upload-artifact@v4
        with:
          name: scan
          path: .
