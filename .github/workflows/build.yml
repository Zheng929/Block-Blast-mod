name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find Gradle
        run: |
          pwd
          ls -R
          find . -name gradlew

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: .
