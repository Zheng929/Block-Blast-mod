name: Unzip Project

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract
        run: |
          unzip update-blockblastsolver-main.zip

      - name: Commit
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com

          git add .
          git commit -m "extract project" || true
          git push
